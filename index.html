<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RoofFlow AI | Automated Roofing Pipeline</title>

<!-- SUPABASE -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{
  margin:0;
  font-family:system-ui;
  background:#020617;
  color:#fff;
}

.container{
  max-width:1100px;
  margin:auto;
  padding:40px 20px;
}

h1{font-size:54px;line-height:1.1}
h2{font-size:32px;margin-bottom:10px}
p{color:#cbd5f5;line-height:1.5}

.btn{
  padding:16px 32px;
  background:#22c55e;
  color:#000;
  font-weight:700;
  border:none;
  border-radius:10px;
  cursor:pointer;
  margin-top:15px;
}

.section{margin-top:70px}

.grid{
  display:grid;
  gap:20px;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
}

.card{
  background:#0f172a;
  padding:24px;
  border-radius:16px;
  border:1px solid rgba(255,255,255,0.05);
}

.badge{
  background:#22c55e;
  color:#000;
  padding:5px 10px;
  border-radius:6px;
  font-size:12px;
  font-weight:700;
}

.feed-item{
  background:rgba(255,255,255,0.04);
  padding:12px;
  border-radius:10px;
  margin-top:10px;
  border-left:3px solid #22c55e;
}
</style>
</head>

<body>
<div class="container">

<!-- HERO -->
<section>
<span class="badge">AI Roofing Acquisition System</span>
<h1>Automated Roofing Jobs On Demand</h1>
<p>We run your entire roofing lead pipeline — generate, filter, and deliver real homeowner jobs automatically.</p>

<button class="btn" onclick="showStep()">Check Availability In Your Area</button>
</section>

<!-- STEP FORM -->
<section class="section" id="stepSection" style="display:none;">
<h2>Find Leads In Your Area</h2>

<input id="city" placeholder="Enter your city" style="padding:12px;width:100%;margin-top:10px;">
<input id="type" placeholder="Roofing service type (repair, storm, replacement)" style="padding:12px;width:100%;margin-top:10px;">

<button class="btn" onclick="startCheckout()">Activate System</button>
</section>

<!-- LIVE FEED -->
<section class="section">
<h2>🔥 Live Lead Activity</h2>
<div id="feed"></div>
</section>

</div>

<script>
// =========================
// SUPABASE INIT
// =========================
const supabaseUrl = "YOUR_SUPABASE_URL";
const supabaseKey = "YOUR_SUPABASE_ANON_KEY";

const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);

// =========================
// UI
// =========================
function showStep(){
  document.getElementById("stepSection").style.display = "block";
  window.scrollTo({ top: document.body.scrollHeight, behavior: "smooth" });
}

// =========================
// MAIN FUNCTION (SAVE + REDIRECT)
// =========================
async function startCheckout(){
  const city = document.getElementById("city").value;
  const type = document.getElementById("type").value;

  // local cache
  localStorage.setItem("lead_city", city);
  localStorage.setItem("lead_type", type);

  // button UX
  const btn = document.querySelector("#stepSection .btn");
  btn.innerText = "Saving Lead...";
  btn.disabled = true;

  // SAVE TO SUPABASE
  const { error } = await supabase
    .from("leads")
    .insert([
      {
        city: city,
        type: type,
        created_at: new Date().toISOString()
      }
    ]);

  if (error) {
    console.error(error);
    alert("Error saving lead");
    btn.innerText = "Activate System";
    btn.disabled = false;
    return;
  }

  // redirect step
  btn.innerText = "Redirecting...";

  setTimeout(() => {
    window.location.href = "https://buy.stripe.com/test_YOUR_LINK";
  }, 700);
}

// =========================
// LIVE FEED (SIMULATION)
// =========================
const cities = ["Dallas", "Houston", "Calgary", "Toronto", "Phoenix"];
const types = ["Roof Leak", "Storm Damage", "Inspection Request", "Roof Replacement"];

function addLead(){
  const div = document.createElement("div");
  div.className = "feed-item";

  const city = cities[Math.floor(Math.random()*cities.length)];
  const type = types[Math.floor(Math.random()*types.length)];
  const score = Math.floor(Math.random()*25)+75;

  div.innerHTML = `
    📍 ${city} — ${type}<br>
    <b style="color:#22c55e">HOT ${score}/100</b> — Just now
  `;

  const feed = document.getElementById("feed");
  feed.prepend(div);

  if(feed.children.length > 6){
    feed.removeChild(feed.lastChild);
  }
}

for(let i=0;i<4;i++) addLead();
setInterval(addLead, 3500);
</script>

</body>
</html>
