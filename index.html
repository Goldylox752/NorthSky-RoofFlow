<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RoofFlow | Roofing Leads System</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://js.stripe.com/v3/"></script>

<style>
body{
  margin:0;
  font-family:system-ui;
  background:#020617;
  color:#fff;
}

.container{
  max-width:1100px;
  margin:auto;
  padding:40px 20px;
}

h1{font-size:50px;line-height:1.1}
h2{font-size:28px;margin-bottom:10px}
p{color:#cbd5f5}

.btn{
  padding:16px 32px;
  background:#22c55e;
  color:#000;
  font-weight:700;
  border:none;
  border-radius:10px;
  cursor:pointer;
  margin-top:15px;
}

.section{margin-top:70px}

input{
  padding:14px;
  width:100%;
  margin-top:10px;
  border-radius:8px;
  border:none;
}

.card{
  background:#0f172a;
  padding:20px;
  border-radius:12px;
  margin-top:15px;
}
</style>
</head>

<body>
<div class="container">

<!-- HERO -->
<section>
<h1>Get Roofing Leads That Turn Into Jobs</h1>
<p>We connect you with homeowners who need roofing work right now.</p>
<button class="btn" onclick="showStep()">Claim Your Area</button>
</section>

<!-- HOMEOWNER LEAD FORM -->
<section class="section">
<h2>Need Roofing Help?</h2>

<input id="h_name" placeholder="Your Name">
<input id="h_phone" placeholder="Phone Number">
<input id="h_city" placeholder="City">
<input id="h_issue" placeholder="Roof issue">

<button class="btn" onclick="submitLead()">Get Help Fast</button>

<p id="leadStatus"></p>
</section>

<!-- CONTRACTOR SIGNUP -->
<section class="section" id="stepSection" style="display:none;">
<h2>Contractor Access</h2>

<input id="c_name" placeholder="Company Name">
<input id="c_phone" placeholder="Phone Number">
<input id="c_city" placeholder="City">

<button class="btn" onclick="registerContractor()">Join & Get Leads</button>

<p id="status"></p>
</section>

<!-- ADMIN PANEL -->
<section class="section">
<h2>Live Leads (Admin)</h2>
<div id="admin"></div>
</section>

</div>

<script>
// CONFIG
const supabase = window.supabase.createClient(
  "YOUR_SUPABASE_URL",
  "YOUR_SUPABASE_ANON_KEY"
);

// =========================
// UI
// =========================
function showStep(){
  document.getElementById("stepSection").style.display = "block";
}

// =========================
// SUBMIT HOMEOWNER LEAD
// =========================
async function submitLead(){
  const name = h_name.value.trim();
  const phone = h_phone.value.trim();
  const city = h_city.value.trim();
  const issue = h_issue.value.trim();
  const status = document.getElementById("leadStatus");

  if(!name || !phone || !city){
    status.innerText = "Fill required fields";
    return;
  }

  status.innerText = "Submitting...";

  try {
    // Save lead
    const { data } = await supabase.from("homeowner_leads").insert([
      { name, phone, city, issue }
    ]).select();

    // Notify Discord
    await fetch("YOUR_DISCORD_WEBHOOK", {
      method:"POST",
      headers:{ "Content-Type":"application/json" },
      body:JSON.stringify({
        content:`🚨 NEW LEAD\n${city}\n${issue}\n${phone}`
      })
    });

    // Send to contractors
    sendToContractors(city, issue, phone);

    status.innerText = "Submitted!";

  } catch(err){
    status.innerText = "Error";
  }
}

// =========================
// CONTRACTOR REGISTER
// =========================
async function registerContractor(){
  const name = c_name.value.trim();
  const phone = c_phone.value.trim();
  const city = c_city.value.trim();
  const status = document.getElementById("status");

  if(!name || !phone || !city){
    status.innerText = "Fill fields";
    return;
  }

  await supabase.from("contractors").insert([
    { name, phone, city }
  ]);

  status.innerText = "You're in! Leads will be sent to you.";
}

// =========================
// SEND LEADS TO CONTRACTORS
// =========================
async function sendToContractors(city, issue, phone){

  const { data: contractors } = await supabase
    .from("contractors")
    .select("*")
    .eq("city", city);

  if(!contractors) return;

  contractors.forEach(async (c) => {

    // 🔥 SMS HOOK (Twilio backend)
    await fetch("/api/send-sms", {
      method:"POST",
      headers:{ "Content-Type":"application/json" },
      body:JSON.stringify({
        to: c.phone,
        message: `New roofing lead in ${city}: ${issue} ${phone}`
      })
    });

  });
}

// =========================
// ADMIN PANEL
// =========================
async function loadLeads(){
  const { data } = await supabase
    .from("homeowner_leads")
    .select("*")
    .order("created_at", { ascending:false })
    .limit(5);

  const admin = document.getElementById("admin");
  admin.innerHTML = "";

  data.forEach(l => {
    const div = document.createElement("div");
    div.className = "card";
    div.innerHTML = `
      📍 ${l.city}<br>
      🛠️ ${l.issue}<br>
      📞 ${l.phone}
    `;
    admin.appendChild(div);
  });
}

loadLeads();
setInterval(loadLeads, 5000);
</script>

</body>
</html>
