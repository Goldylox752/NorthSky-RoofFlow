<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>NorthSky AI | Roofing Territory System</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Inter',sans-serif;}

body{
  background: radial-gradient(circle at top, #111827, #0b1220);
  color:#fff;
}

nav{
  display:flex;
  justify-content:space-between;
  padding:20px 40px;
  border-bottom:1px solid rgba(255,255,255,0.08);
}

.logo{font-weight:700;font-size:20px;}

.hero{
  text-align:center;
  padding:60px 20px 20px;
  max-width:900px;
  margin:auto;
}

.hero h1{font-size:44px;margin-bottom:15px;}
.hero p{opacity:0.75;margin-bottom:15px;}

.login-box{
  max-width:400px;
  margin:20px auto;
  background:#111827;
  padding:20px;
  border-radius:12px;
}

.section{
  text-align:center;
  padding:60px 20px;
}

.paywall{max-width:750px;margin:auto;}

.plan{
  background:#111827;
  padding:22px;
  margin:15px 0;
  border-radius:12px;
  border:1px solid rgba(255,255,255,0.08);
  text-align:left;
}

.plan.pro{border:2px solid #4f46e5;transform:scale(1.02);}
.plan.elite{border:2px solid #22c55e;}

.price{font-size:20px;font-weight:700;margin-bottom:10px;}

button{
  width:100%;
  padding:14px;
  border:none;
  border-radius:8px;
  background:#4f46e5;
  color:white;
  font-weight:600;
  cursor:pointer;
}

input{
  width:100%;
  padding:12px;
  margin-bottom:12px;
  border-radius:8px;
  border:none;
  background:#1f2937;
  color:#fff;
}

.hidden{display:none;}

.form-box{
  background:#111827;
  padding:35px;
  border-radius:14px;
  max-width:520px;
  margin:auto;
}

.small{
  font-size:12px;
  opacity:0.6;
}
</style>
</head>

<body>

<nav>
  <div class="logo">NorthSky AI</div>
</nav>

<!-- HERO -->
<section class="hero">
  <h1>Turn Roof Inspections Into $1K–$5K Jobs</h1>
  <p>AI-powered leads + drone system built for contractors</p>
</section>

<!-- 🔐 LOGIN -->
<div class="login-box">
  <input type="email" id="loginEmail" placeholder="Enter your email">
  <button onclick="login()">Login / Access Dashboard</button>
  <p class="small">Use the same email you used at checkout</p>
</div>

<!-- 🔒 PAYWALL -->
<section id="paywall" class="section paywall">

  <h2>Unlock Your Territory</h2>

  <div class="plan">
    <h3>Starter</h3>
    <div class="price">$99</div>
    <a href="https://buy.stripe.com/dRmfZae1d2eoeofgLK2ZO0C?success_url=https://YOURDOMAIN.com/success.html">
      <button>Get Started</button>
    </a>
  </div>

  <div class="plan pro">
    <h3>Pro Territory</h3>
    <div class="price">$299</div>
    <a href="https://buy.stripe.com/dRm28k8GTaKU1Btcvu2ZO0D?success_url=https://YOURDOMAIN.com/success.html">
      <button>Upgrade to Pro</button>
    </a>
  </div>

  <div class="plan elite">
    <h3>Elite Territory</h3>
    <div class="price">$999</div>
    <a href="https://buy.stripe.com/aFaeV6cX97yIfsjcvu2ZO0E?success_url=https://YOURDOMAIN.com/success.html">
      <button>Unlock Elite</button>
    </a>
  </div>

</section>

<!-- 🔓 APP -->
<section id="app" class="section hidden">
  <div class="form-box">
    <h2>Lock Your Territory</h2>

    <input type="text" id="name" placeholder="Full Name">
    <input type="email" id="email" placeholder="Email">
    <input type="text" id="city" placeholder="City / Region">

    <button onclick="submitLead()">Check Availability</button>
    <div id="status"></div>
  </div>
</section>

<script>

/* ================= INIT ================= */
const supabase = window.supabase.createClient(
  "YOUR_SUPABASE_URL",
  "YOUR_SUPABASE_ANON_KEY"
);

let currentUser = null;

/* ================= LOGIN ================= */
async function login(){

  const email = document.getElementById("loginEmail").value;

  if(!email){
    alert("Enter email");
    return;
  }

  const { error } = await supabase.auth.signInWithOtp({ email });

  if(error){
    alert("Login failed");
    return;
  }

  alert("Check your email for login link");
}

/* ================= AUTH CHECK ================= */
window.onload = async function(){

  const { data: { user } } = await supabase.auth.getUser();

  if(!user) return;

  currentUser = user;

  const { data } = await supabase
    .from("users")
    .select("paid, plan")
    .eq("email", user.email)
    .single();

  if(!data || !data.paid) return;

  // unlock
  document.getElementById("paywall").style.display = "none";
  document.getElementById("app").classList.remove("hidden");
};

/* ================= SESSION ================= */
function getSessionId(){
  let id = localStorage.getItem("session_id");
  if(!id){
    id = crypto.randomUUID();
    localStorage.setItem("session_id", id);
  }
  return id;
}

/* ================= LEAD ================= */
async function submitLead(){

  if(!currentUser){
    alert("Login required");
    return;
  }

  const name = document.getElementById("name").value;
  const email = document.getElementById("email").value;
  const city = document.getElementById("city").value;
  const status = document.getElementById("status");

  if(!name || !email || !city){
    status.innerText = "Fill all fields.";
    return;
  }

  status.innerText = "Saving...";

  const { error } = await supabase.from("leads").insert([{
    name,
    email,
    city,
    user_email: currentUser.email,
    session_id: getSessionId()
  }]);

  if(error){
    status.innerText = "Error. Try again.";
    return;
  }

  status.innerText = "Success — redirecting...";

  setTimeout(() => {
    window.location.href = "https://northsky-drones.vercel.app?bundle=inspection-kit";
  }, 1000);
}

</script>

</body>
</html>
