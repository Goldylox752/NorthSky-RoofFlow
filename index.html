<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>NorthSky | Roofing Lead Engine</title>

<script src="https://js.stripe.com/v3/"></script>

<style>
body {
  margin: 0;
  font-family: system-ui, Arial;
  background: #0b1220;
  color: #fff;
}

.container {
  max-width: 1000px;
  margin: auto;
  padding: 60px 20px;
}

h1 {
  font-size: 42px;
  margin-bottom: 10px;
}

p {
  color: #b6c2d1;
}

.hero {
  text-align: center;
  margin-bottom: 60px;
}

.pricing {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
  gap: 20px;
}

.card {
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 16px;
  padding: 25px;
  text-align: center;
}

.card h2 {
  margin-bottom: 10px;
}

.price {
  font-size: 32px;
  margin: 10px 0;
}

button {
  width: 100%;
  padding: 12px;
  border: none;
  border-radius: 10px;
  cursor: pointer;
  font-size: 16px;
  margin-top: 10px;
}

.btn1 { background: #22c55e; color: #000; }
.btn2 { background: #3b82f6; color: #fff; }
.btn3 { background: #a855f7; color: #fff; }

button:hover {
  opacity: 0.9;
}
</style>
</head>

<body>

<div class="container">

  <!-- HERO -->
  <div class="hero">
    <h1>Get High-Intent Roofing Leads</h1>
    <p>AI-powered lead generation system delivering homeowners ready to book inspections.</p>
  </div>

  <!-- PRICING -->
  <div class="pricing">

    <div class="card">
      <h2>Starter</h2>
      <div class="price">$99/mo</div>
      <p>10 shared leads/month</p>
      <button class="btn1" onclick="checkout('starter')">
        Get Starter
      </button>
    </div>

    <div class="card">
      <h2>Pro</h2>
      <div class="price">$299/mo</div>
      <p>30 leads + SMS alerts</p>
      <button class="btn2" onclick="checkout('pro')">
        Get Pro
      </button>
    </div>

    <div class="card">
      <h2>Elite</h2>
      <div class="price">$999/mo</div>
      <p>100+ exclusive leads</p>
      <button class="btn3" onclick="checkout('elite')">
        Get Elite
      </button>
    </div>

  </div>

</div>

<script>
async function checkout(tier) {
  const email = prompt("Enter your email:");

  if (!email) return;

  const res = await fetch("https://YOUR-BACKEND.onrender.com/api/create-checkout", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({ email, tier })
  });

  const data = await res.json();

  if (data.url) {
    window.location.href = data.url;
  } else {
    alert("Checkout failed");
  }
}
</script>

</body>
</html>
